version: '3.8'

services:
  api:
    build: .
    container_name: sentinel_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  dashboard:
    build: .
    container_name: sentinel_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    depends_on:
      - api
